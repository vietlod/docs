server {
    listen 80;
    root /usr/share/nginx/html/;
    server_name docs.khoviet.com;
    include /etc/nginx/mime.types;
    index index.html;

    # Standalone mode: baseUrl is / (no /docs prefix needed)

    # Static assets - long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Vietnamese locale root
    location = /vi/ {
        try_files /vi/index.html =404;
    }

    # Vietnamese locale paths
    location ~ ^/vi/(.*)$ {
        try_files /vi/$1 /vi/$1/ /vi/$1/index.html /vi/index.html /vi/404.html =404;
    }

    # Default locale - SPA routing
    location / {
        try_files $uri $uri/ $uri/index.html /index.html =404;
    }

    # Error pages
    error_page 404 /404.html;

    # Gzip compression
    gzip on;
    gzip_static on;
    gzip_http_version 1.0;
    gzip_min_length 500;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_types
        text/html
        text/css
        text/javascript
        text/xml
        text/plain
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;
}
