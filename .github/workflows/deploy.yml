# ==============================================================================
# CI/CD: Trigger VPS auto-deploy via Webhook
# Trigger: push to main (only when docs/i18n/src/static content changes)
# Strategy: VPS tự git pull + build (không cần SSH từ GitHub Actions)
# ==============================================================================

name: Deploy Docs to VPS

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'i18n/**'
      - 'static/**'
      - 'src/**'
      - 'sidebars.js'
      - 'docusaurus.config.js'
      - 'package.json'
      - 'package-lock.json'

# Only one deploy at a time, cancel in-progress if new push arrives
concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger VPS deploy webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          PAYLOAD='{"ref":"refs/heads/main","pusher":{"name":"github-actions"}}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            "https://docs.tnsai.vn/webhook/docs")
          
          RESPONSE=$(cat /tmp/response.txt)
          echo "HTTP $HTTP_CODE: $RESPONSE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Deploy webhook triggered successfully"
