# ==============================================================================
# CI/CD: Build Docusaurus + rsync to VPS
# Trigger: push to main (only when docs/i18n/src/static content changes)
# ==============================================================================

name: Deploy Docs to VPS

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'i18n/**'
      - 'static/**'
      - 'src/**'
      - 'sidebars.js'
      - 'docusaurus.config.js'
      - 'package.json'
      - 'package-lock.json'

# Only one deploy at a time, cancel in-progress if new push arrives
concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus
        run: npm run build

      - name: Deploy to VPS via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          ARGS: "-avzr --delete"
          SOURCE: "build/"
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          TARGET: "/opt/docs/ecodata/build"
