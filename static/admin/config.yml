# ==============================================================================
# Sveltia CMS Configuration for TNS AI Docs (Docusaurus)
# Trang quản trị nội dung tại: https://docs.tnsai.vn/admin/
# ==============================================================================

backend:
  name: github
  repo: vietlod/docs
  branch: main
  base_url: https://docs.tnsai.vn
  auth_endpoint: oauth/auth

site_url: https://docs.tnsai.vn
display_url: https://docs.tnsai.vn
logo_url: /admin/logo.svg

media_folder: "static/img"
public_folder: "/img"

# ==============================================================================
# COLLECTIONS — Vietnamese (default locale, docs/)
# ==============================================================================
# Ghi chú:
#   - EcoData dùng .mdx (có React components), các app khác dùng .md
#   - Bản dịch EN nằm ở i18n/en/docusaurus-plugin-content-docs/current/
#   - Collections EN được tách riêng ở cuối file
# ==============================================================================

collections:
  # ============================================================================
  # ECODATA (extension: mdx)
  # ============================================================================
  - name: "ecodata-root"
    label: "📊 EcoData — Tổng quan"
    folder: "docs/ecodata"
    create: true
    extension: "mdx"
    format: "frontmatter"
    filter: { field: "title" }
    fields: &doc_fields
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false }
      - { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Keywords", name: "keywords", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "ecodata-bat-dau"
    label: "📊 EcoData — Bắt đầu"
    folder: "docs/ecodata/bat-dau"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecodata-du-lieu"
    label: "📊 EcoData — Dữ liệu"
    folder: "docs/ecodata/du-lieu"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecodata-nguon-du-lieu"
    label: "📊 EcoData — Nguồn dữ liệu"
    folder: "docs/ecodata/nguon-du-lieu"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecodata-cong-cu"
    label: "📊 EcoData — Công cụ"
    folder: "docs/ecodata/cong-cu"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecodata-xuat-du-lieu"
    label: "📊 EcoData — Xuất dữ liệu"
    folder: "docs/ecodata/xuat-du-lieu"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecodata-indicators"
    label: "📊 EcoData — Indicators"
    folder: "docs/ecodata/indicators"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecodata-admin"
    label: "📊 EcoData — Admin"
    folder: "docs/ecodata/admin"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecodata-trien-khai"
    label: "📊 EcoData — Triển khai"
    folder: "docs/ecodata/trien-khai"
    create: true
    extension: "mdx"
    format: "frontmatter"
    fields: *doc_fields

  # ============================================================================
  # ECOLAB (extension: md)
  # ============================================================================
  - name: "ecolab-root"
    label: "🧪 EcoLab — Tổng quan"
    folder: "docs/ecolab"
    create: true
    extension: "md"
    format: "frontmatter"
    filter: { field: "title" }
    fields: *doc_fields

  - name: "ecolab-bat-dau"
    label: "🧪 EcoLab — Bắt đầu"
    folder: "docs/ecolab/bat-dau"
    create: true
    extension: "md"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecolab-model"
    label: "🧪 EcoLab — Mô hình"
    folder: "docs/ecolab/model"
    create: true
    extension: "md"
    format: "frontmatter"
    fields: *doc_fields

  - name: "ecolab-vi-du"
    label: "🧪 EcoLab — Ví dụ thực nghiệm"
    folder: "docs/ecolab/vi-du"
    create: true
    extension: "md"
    format: "frontmatter"
    fields: *doc_fields

  # ============================================================================
  # ECOLIT (extension: md)
  # ============================================================================
  - name: "ecolit-root"
    label: "📚 EcoLit — Tổng quan"
    folder: "docs/ecolit"
    create: true
