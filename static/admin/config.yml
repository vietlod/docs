# ==============================================================================
# Sveltia CMS Configuration for TNS AI Docs (Docusaurus)
# Trang quản trị nội dung tại: https://docs.tnsai.vn/admin/
# ==============================================================================

backend:
  name: github
  repo: vietlod/docs
  branch: main
  base_url: https://docs.tnsai.vn
  auth_endpoint: oauth/auth

# ------------------------------------------------------------------------------
# i18n — Docusaurus multiple_folders structure
# Vietnamese (vi): docs/<app>/...
# English (en):    i18n/en/docusaurus-plugin-content-docs/current/<app>/...
# ------------------------------------------------------------------------------
i18n:
  structure: multiple_folders
  locales: [vi, en]
  default_locale: vi

media_folder: "static/img"
public_folder: "/img"

# ==============================================================================
# COLLECTIONS
# ==============================================================================

collections:
  # ============================================================================
  # ECODATA
  # ============================================================================
  - name: "ecodata-root"
    label: "EcoData — Tổng quan"
    folder: "docs/ecodata"
    i18n: true
    create: true
    extension: "md"
    format: "frontmatter"
    filter: { field: "title" }
    fields: &doc_fields
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false }
      - { label: "Sidebar Label", name: "sidebar_label", widget: "string", required: false, i18n: true }
      - { label: "Description", name: "description", widget: "string", required: false, i18n: true }
      - { label: "Keywords", name: "keywords", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown", i18n: true }

  - name: "ecodata-bat-dau"
    label: "EcoData — Bắt đầu"
    folder: "docs/ecodata/bat-dau"
    i18n: true
    create: true
    extension: "md"
    format: "frontmatter"
    fields: *doc_fields

