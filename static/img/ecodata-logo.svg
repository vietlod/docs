<svg width="160" height="51" viewBox="0 0 160 51" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ECODATA Logo - Economic Data Platform -->
  <!-- Background -->
  <rect width="160" height="51" rx="4" fill="#1e40af"/>
  
  <!-- Chart icon representing economic data -->
  <g transform="translate(10, 8)">
    <!-- Chart bars -->
    <rect x="0" y="20" width="4" height="8" fill="white" opacity="0.9"/>
    <rect x="6" y="15" width="4" height="13" fill="white" opacity="0.9"/>
    <rect x="12" y="10" width="4" height="18" fill="white" opacity="0.9"/>
    <rect x="18" y="12" width="4" height="16" fill="white" opacity="0.9"/>
    <!-- Trend line -->
    <path d="M 2 22 L 8 17 L 14 12 L 20 14" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>
  </g>
  
  <!-- ECODATA Text -->
  <text x="45" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" letter-spacing="1">ECODATA</text>
  <text x="45" y="40" font-family="Arial, sans-serif" font-size="7" fill="#93c5fd" letter-spacing="0.5">Economic Data Platform</text>
</svg>
